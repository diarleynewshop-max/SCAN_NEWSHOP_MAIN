services:
  evolution-api:
    image: evoapicloud/evolution-api:v2.3.7
    container_name: evolution_api
    restart: unless-stopped
    depends_on:
      evolution-postgres:
        condition: service_healthy
      evolution-redis:
        condition: service_started
    env_file: .env
    ports:
      - "127.0.0.1:8088:8080"
    volumes:
      - evolution_instances:/evolution/instances
    networks: [evolution]

  evolution-postgres:
    image: postgres:15-alpine
    container_name: evolution_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: evolution
      POSTGRES_USER: evolution
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - evolution_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U evolution -d evolution"]
      interval: 5s
      timeout: 5s
      retries: 20
    networks: [evolution]

  evolution-redis:
    image: redis:7-alpine
    container_name: evolution_redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - evolution_redis:/data
    networks: [evolution]

  relatorio-worker:
    build: ./relatorio-worker
    container_name: evolution_relatorio_worker
    profiles: [worker]
    restart: "no"
    environment:
      SUPABASE_DB_HOST: supabase-db
      SUPABASE_DB_PORT: 5432
      SUPABASE_DB_NAME: postgres
      SUPABASE_DB_USER: ${SUPABASE_DB_USER:-relatorio_worker}
      SUPABASE_DB_PASSWORD: ${SUPABASE_DB_PASSWORD}
      TZ: America/Sao_Paulo
    env_file: .env
    networks: [evolution, supabase]

volumes:
  evolution_instances:
  evolution_postgres:
  evolution_redis:

networks:
  evolution:
    name: evolution_network
  supabase:
    external: true
    name: supabase_default
